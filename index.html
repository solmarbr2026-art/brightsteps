<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#FFF8F0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="BrightSteps"/>
<title>BrightSteps – Calendário Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --orange: #E8951A;
    --yellow: #F5C842;
    --blue: #4A9FD4;
    --purple: #9B6BC5;
    --coral: #E85A3A;
    --bg: #FFF8F0;
    --surface: #FFFFFF;
    --surface2: #FEF3E2;
    --text: #2D2416;
    --text2: #7A6A52;
    --text3: #B5A48A;
    --border: #F0E4D0;
    --radius: 16px;
    --shadow: 0 4px 20px rgba(232,149,26,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overscroll-behavior: none; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #FFFDF9 0%, #FEF3E2 100%);
    border-bottom: 2px solid var(--border);
    padding: 16px 16px 0;
    position: sticky; top: 0; z-index: 50;
  }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .logo-wrap { width: 52px; height: 52px; border-radius: 50%; overflow: hidden; border: 2px solid var(--border); flex-shrink: 0; background: white; }
  .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .brand-text { flex: 1; }
  .brand-name { font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 700; color: var(--orange); line-height: 1.1; }
  .brand-sub { font-size: 10px; color: var(--blue); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .brand-caption { font-size: 11px; color: var(--text3); margin-top: 1px; }

  .view-tabs { display: flex; gap: 6px; }
  .tab-btn { padding: 6px 14px; border-radius: 20px; border: none; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; cursor: pointer; transition: all .2s; }
  .tab-btn.active { background: var(--orange); color: white; box-shadow: 0 2px 10px rgba(232,149,26,0.35); }
  .tab-btn.inactive { background: white; color: var(--text3); border: 1.5px solid var(--border); }

  /* MONTH NAV */
  .month-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .nav-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); background: white; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--orange); font-weight: 800; }
  .month-title { font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); flex: 1; }
  .month-title span { color: var(--text3); font-size: 14px; font-weight: 500; }
  .today-btn { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--orange); background: white; color: var(--orange); font-size: 11px; font-weight: 800; cursor: pointer; font-family: 'Nunito', sans-serif; }

  /* PLATFORM FILTER */
  .filter-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .filter-chip { flex-shrink: 0; padding: 4px 12px; border-radius: 20px; border: 1.5px solid; font-size: 11px; font-weight: 800; cursor: pointer; transition: all .2s; font-family: 'Nunito', sans-serif; }

  /* STATS */
  .stats-row { display: flex; gap: 8px; overflow-x: auto; padding: 12px 16px 4px; scrollbar-width: none; }
  .stats-row::-webkit-scrollbar { display: none; }
  .stat-chip { flex-shrink: 0; padding: 7px 12px; border-radius: 12px; display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; }

  /* CALENDAR GRID */
  .cal-wrap { padding: 12px 16px 100px; }
  .day-headers { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; margin-bottom: 4px; }
  .day-hdr { text-align: center; font-size: 10px; font-weight: 800; color: var(--text3); letter-spacing: .5px; padding: 3px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
  .cal-cell {
    min-height: 70px; border-radius: 12px; padding: 5px;
    background: white; border: 1.5px solid var(--border);
    cursor: pointer; transition: all .15s; position: relative;
  }
  .cal-cell:hover { border-color: var(--orange); box-shadow: 0 2px 12px rgba(232,149,26,0.15); }
  .cal-cell.today { background: #FEF3E2; border-color: var(--orange); }
  .cal-day-num { font-size: 11px; font-weight: 800; color: var(--text2); margin-bottom: 3px; }
  .cal-cell.today .cal-day-num { color: var(--orange); }
  .cal-post-chip { font-size: 8px; padding: 2px 4px; border-radius: 4px; font-weight: 800; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 2px solid; }
  .cal-badge { position: absolute; top: 4px; right: 4px; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; }

  /* AGENDA */
  .agenda-wrap { padding: 12px 16px 100px; }
  .agenda-date-header { font-size: 11px; font-weight: 900; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; padding: 12px 0 6px; }
  .agenda-item { padding: 12px 14px; border-radius: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; border: 1.5px solid; }
  .agenda-time { font-size: 12px; font-weight: 800; color: var(--text2); min-width: 40px; }
  .agenda-bar { width: 3px; height: 40px; border-radius: 2px; flex-shrink: 0; }
  .agenda-content { flex: 1; min-width: 0; }
  .agenda-title { font-weight: 800; font-size: 13px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .agenda-chips { display: flex; gap: 5px; flex-wrap: wrap; }
  .agenda-chip { font-size: 9px; padding: 2px 7px; border-radius: 10px; font-weight: 800; }
  .agenda-notes { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .agenda-actions { display: flex; gap: 5px; }
  .icon-btn { width: 28px; height: 28px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; }

  /* EMPTY */
  .empty { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* FAB */
  .fab { position: fixed; bottom: 24px; right: 20px; width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer; font-size: 26px; display: flex; align-items: center; justify-content: center; z-index: 100; background: linear-gradient(135deg, var(--orange), var(--yellow)); box-shadow: 0 4px 20px rgba(232,149,26,0.45); color: white; font-weight: 900; transition: transform .15s; }
  .fab:active { transform: scale(0.93); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(45,36,22,0.55); z-index: 200; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(3px); }
  .modal-sheet { width: 100%; max-width: 500px; background: white; border-radius: 24px 24px 0 0; padding: 24px; max-height: 88vh; overflow-y: auto; border-top: 3px solid var(--orange); }
  .modal-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 16px; }
  .modal-title { font-family: 'Poppins', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; }
  .modal-close { width: 30px; height: 30px; border-radius: 50%; background: var(--bg); border: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .field-label { font-size: 10px; font-weight: 900; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; display: block; }
  .field-input { width: 100%; padding: 11px 13px; border-radius: 12px; border: 1.5px solid var(--border); font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--text); outline: none; background: var(--bg); margin-bottom: 14px; }
  .field-input:focus { border-color: var(--orange); background: white; }
  .chip-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .sel-chip { padding: 6px 13px; border-radius: 20px; border: 1.5px solid; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; cursor: pointer; transition: all .15s; background: white; }
  .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
  .btn-delete { flex: 1; padding: 13px; border-radius: 12px; border: 1.5px solid #FFCDD2; background: #FFF5F5; color: #E53935; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; cursor: pointer; }
  .btn-save { flex: 2; padding: 13px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--orange), var(--yellow)); color: white; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 900; cursor: pointer; box-shadow: 0 3px 12px rgba(232,149,26,0.35); }
  .btn-save:disabled { background: var(--border); color: var(--text3); box-shadow: none; cursor: not-allowed; }

  /* INSTALL BANNER */
  .install-banner { margin: 12px 16px 0; padding: 12px 14px; background: linear-gradient(135deg, #E8F5FF, #EEF5FF); border: 1.5px solid #C5DFF5; border-radius: 14px; display: flex; align-items: center; gap: 10px; }
  .install-banner-text { flex: 1; font-size: 11px; font-weight: 700; color: var(--blue); }
  .install-btn { padding: 6px 12px; border-radius: 10px; background: var(--blue); color: white; border: none; font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800; cursor: pointer; }

  @media (prefers-color-scheme: dark) { body { background: var(--bg); } }
</style>

  Instagram:"#E1306C", Facebook:"#1877F2", TikTok:"#010101",
  YouTube:"#FF0000", LinkedIn:"#0A66C2", Blog:"#E8951A",
  Stories:"#9B6BC5", Reels:"#4A9FD4"
};
const CATEGORIES = ["Educativo","Dicas","Eventos","Bastidores","Promoção","Institucional","Tendência"];
const CAT_COLORS = {
  Educativo:"#4A9FD4", Dicas:"#E8951A", Eventos:"#E85A3A",
  Bastidores:"#9B6BC5", Promoção:"#F5C842", Institucional:"#52B788", Tendência:"#E1306C"

const MONTHS = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const DAYS_S = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const STORAGE_KEY = "bs-calendar-v1";

function loadPosts() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch { return {}; }
}
function savePosts(p) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch {}
}
function daysInMonth(y,m) { return new Date(y,m+1,0).getDate(); }
function firstDOW(y,m) { return new Date(y,m,1).getDay(); }

// ── STATE ─────────────────────────────────────────────────────────────────────
const today = new Date();
let state = {
  year: today.getFullYear(), month: today.getMonth(),
  posts: loadPosts(),
  view: "calendar", filter: "Todas",
  modal: false, selDay: null, editIdx: null,
  form: { title:"", platform:"Instagram", category:"Educativo", notes:"", time:"09:00" },
  deferredPrompt: null, showInstalar: false,
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function mk(state) { return `${state.year}-${state.month}`; }
function getDay(s, day) {
  const all = s.posts[mk(s)]?.[day] || [];
  return s.filter === "Todas" ? all : all.filter(p => p.platform === s.filter);
}
function monthTotal(s) {
  return Object.values(s.posts[mk(s)] || {}).flat().length;
}
function platformCounts(s) {
  const counts = {};
  Object.values(s.posts[mk(s)] || {}).flat().forEach(p => { counts[p.platform] = (counts[p.platform]||0)+1; });
  return counts;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const s = state;
  const app = document.getElementById("app");

  const total = monthTotal(s);
  const pcounts = platformCounts(s);
  const dim = daysInMonth(s.year, s.month);
  const fdow = firstDOW(s.year, s.month);

  // Build agenda items
  const agendaItems = [];
  for (let d=1; d<=dim; d++) {
    const ps = getDay(s, d);
    ps.forEach((p,i) => agendaItems.push({day:d, idx:i, ...p}));
  }

  app.innerHTML = `
  <!-- HEADER -->

function renderCalendar(s, dim, fdow) {
  let cells = "";
  for (let i=0;i<fdow;i++) cells += `<div></div>`;
  for (let d=1;d<=dim;d++) {
    const ps = getDay(s,d);
    const isHoje = d===today.getDate() && s.month===today.getMonth() && s.year===today.getFullYear();
    const chips = ps.slice(0,3).map((p,i) => `
      <div class="cal-post-chip" onclick="event.stopPropagation();openEdit(${d},${i})"
        style="background:${PLAT_COLORS[p.platform]}18;color:${PLAT_COLORS[p.platform]};border-color:${PLAT_COLORS[p.platform]}">
        ${p.time} ${p.title}
      </div>`).join("");
    const mais = ps.length>3 ? `<div style="font-size:8px;color:#B5A48A;padding-left:2px">+${ps.length-3} mais</div>` : "";
    const badge = ps.length>0 ? `<div class="cal-badge" style="background:${PLAT_COLORS[ps[0].platform]};color:white">${ps.length}</div>` : "";
    cells += `<div class="cal-cell${isHoje?" today":""}" onclick="openAdd(${d})">
      <div class="cal-day-num">${d}</div>${chips}${mais}${badge}
    </div>`;
  }
  return `<div class="cal-wrap">
    <div class="day-headers">${DAYS_S.map(d=>`<div class="day-hdr">${d}</div>`).join("")}</div>
    <div class="cal-grid">${cells}</div>
  </div>`;
}

function renderAgenda(s, items) {
  if (!items.length) return `<div class="agenda-wrap"><div class="empty">
    <div class="empty-icon">🌟</div>
    <div style="font-size:14px;font-weight:700;color:#7A6A52">No posts planejados este mês</div>
    <div style="font-size:12px;margin-top:6px;color:#B5A48A">Toque em um dia no calendário para adicionar</div>
  </div></div>`;

  let html = `<div class="agenda-wrap">`;
  let prevDay = null;
  items.forEach(item => {
    if (item.day !== prevDay) {
      html += `<div class="agenda-date-header">${DAYS_S[new Date(s.year,s.month,item.day).getDay()]}, ${item.day} ${MONTHS[s.month]}</div>`;
      prevDay = item.day;
    }
    html += `<div class="agenda-item" style="background:${PLAT_COLORS[item.platform]}0D;border-color:${PLAT_COLORS[item.platform]}30">
      <div class="agenda-time">${item.time}</div>
      <div class="agenda-bar" style="background:${PLAT_COLORS[item.platform]}"></div>
      <div class="agenda-content">
        <div class="agenda-title">${item.title}</div>
        <div class="agenda-chips">
          <span class="agenda-chip" style="background:${PLAT_COLORS[item.platform]}20;color:${PLAT_COLORS[item.platform]}">${item.platform}</span>
          <span class="agenda-chip" style="background:${CAT_COLORS[item.category]}20;color:${CAT_COLORS[item.category]}">${item.category}</span>
        </div>
        ${item.notes ? `<div class="agenda-notes">${item.notes}</div>` : ""}
      </div>
      <div class="agenda-actions">
        <button class="icon-btn" onclick="openEdit(${item.day},${item.idx})" style="background:#FEF3E2">✏️</button>
        <button class="icon-btn" onclick="deletePost(${item.day},${item.idx})" style="background:#FFF5F5">🗑</button>
      </div>
    </div>`;
  });
  return html + `</div>`;
}

function renderModal(s) {
  const editing = s.editIdx !== null;
  const f = s.form;
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">
        <span>${editing?"✏️ Editar Post":"🌟 Novo Post"} — ${s.selDay} ${MONTHS[s.month]}</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <label class="field-label">Título do conteúdo *</label>
      <input class="field-input" type="text" placeholder="Ex: 5 dicas para uma rotina saudável" value="${escHtml(f.title)}" oninput="updateForm('title',this.value)"/>

      <label class="field-label">Horário</label>
      <input class="field-input" type="time" value="${f.time}" oninput="updateForm('time',this.value)" style="margin-bottom:14px"/>

      <label class="field-label">Plataforma</label>
      <div class="chip-group">
        ${PLATFORMS.map(p => {
          const active = f.platform===p;
          return `<button class="sel-chip" onclick="updateForm('platform','${p}')"
            style="border-color:${active?PLAT_COLORS[p]:"#F0E4D0"};background:${active?PLAT_COLORS[p]+"20":"white"};color:${active?PLAT_COLORS[p]:"#B5A48A"}">${p}</button>`;
        }).join("")}
      </div>

      <label class="field-label">Categoria</label>
      <div class="chip-group">
        ${CATEGORIES.map(c => {
          const active = f.category===c;
          return `<button class="sel-chip" onclick="updateForm('category','${c}')"
            style="border-color:${active?CAT_COLORS[c]:"#F0E4D0"};background:${active?CAT_COLORS[c]+"20":"white"};color:${active?CAT_COLORS[c]:"#B5A48A"}">${c}</button>`;
        }).join("")}
      </div>

      <label class="field-label">Observações</label>
      <textarea class="field-input" rows="2" placeholder="Referências, links, ideias..." oninput="updateForm('notes',this.value)" style="resize:none;font-family:inherit">${escHtml(f.notes)}</textarea>

      <div class="modal-actions">
        ${editing ? `<button class="btn-delete" onclick="deletePost(${s.selDay},${s.editIdx});closeModal()">🗑 Excluir</button>` : ""}
        <button class="btn-save" onclick="savePost()" ${!f.title.trim()?"disabled":""}>
          ${editing?"💾 Salvar":"✅ Adicionar"}
        </button>
      </div>
    </div>
  </div>`;
}

function escHtml(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;"); }

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function setView(v) { state.view=v; render(); }
function setFilter(f) { state.filter=f; render(); }
function prevMonth() { if(state.month===0){state.month=11;state.year--;}else state.month--; render(); }
function nextMonth() { if(state.month===11){state.month=0;state.year++;}else state.month++; render(); }
function goHoje() { state.year=today.getFullYear(); state.month=today.getMonth(); render(); }

function openAdd(day) {
  state.selDay=day; state.editIdx=null;
  state.form={title:"",platform:"Instagram",category:"Educativo",notes:"",time:"09:00"};
  state.modal=true; render();
}
function openEdit(day,idx) {
  const p = state.posts[mk(state)]?.[day]?.[idx];
  if(!p) return;
  state.selDay=day; state.editIdx=idx;
  state.form={...p}; state.modal=true; render();
}
function closeModal() { state.modal=false; render(); }
function updateForm(k,v) {
  state.form[k] = v;
  const saveBtn = document.querySelector('.btn-save');
  if (saveBtn && state.form && typeof state.form.title === 'string') {
    saveBtn.disabled = !state.form.title.trim();
  }
}

function savePost() {
  if(!state.form.title.trim()) return;
  const key = mk(state);
  if(!state.posts[key]) state.posts[key]={};
  if(!state.posts[key][state.selDay]) state.posts[key][state.selDay]=[];
  const arr = [...state.posts[key][state.selDay]];
  if(state.editIdx!==null) arr[state.editIdx]={...state.form};
  else arr.push({...state.form});
  arr.sort((a,b)=>a.time.localeCompare(b.time));
  state.posts[key][state.selDay]=arr;
  savePosts(state.posts);
  state.modal=false; render();
}
function deletePost(day,idx) {
  const key = mk(state);
  const arr = [...(state.posts[key]?.[day]||[])];
  arr.splice(idx,1);
  state.posts[key][day]=arr;
  savePosts(state.posts);
  render();
}

// ── PWA INSTALL ───────────────────────────────────────────────────────────────
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  state.deferredPrompt = e;
  state.showInstalar = true;
  render();
});
function installApp() {
  if(!state.deferredPrompt) return;
  state.deferredPrompt.prompt();
  state.deferredPrompt.userChoice.then(() => { state.deferredPrompt=null; state.showInstalar=false; render(); });
}
function dismissInstalar() { state.showInstalar=false; render(); }


// ── TELEGRAM BOT SYNC ─────────────────────────────────────────────────────────
const BOT_SYNC_URL = localStorage.getItem("bs-bot-url") || "";

async function syncWithBot(posts) {
  if (!BOT_SYNC_URL) return;
  try {
    await fetch(BOT_SYNC_URL + "/sync", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(posts)
    });
    console.log("✅ Synced with Telegram bot");
  } catch(e) { console.log("Bot sync failed (ok if not configured)", e.message); }
}

// Override savePosts to also sync
const _origSavePosts = savePosts;
function savePosts(p) { _origSavePosts(p); syncWithBot(p); }


function openSettings() {
  const current = localStorage.getItem("bs-bot-url") || "";
  const url = prompt("🤖 URL do Bot Telegram (Railway):\n\nCole aqui a URL do Railway para ativar notificações diárias.\nDeixe vazio para pular.", current);
  if (url !== null) {
    localStorage.setItem("bs-bot-url", url.trim());
    if (url.trim()) {
      syncWithBot(state.posts);
      alert("✅ URL do bot salva! Seus posts serão sincronizados automaticamente.\n\nNão esqueça de:\n1. Iniciar o bot no Telegram\n2. Copiar o Chat ID para o Railway");
    }
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>

<!-- PWA SERVICE WORKER -->
<script>
if("serviceWorker" in navigator) {
  const sw = `
    const CACHE = "bs-cal-v1";
    const ASSETS = [self.location.href];
    self.addEventListener("install", e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))));
    self.addEventListener("fetch", e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
  `;
  const blob = new Blob([sw], {type:"application/javascript"});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url);
}
</script>


<script>
(function() {
  if (typeof savePost === 'function') {
    const originalSavePost = savePost;
    window.savePost = function() {
      const before = JSON.stringify(window.state && state.posts ? state.posts : {});
      const result = originalSavePost.apply(this, arguments);
      const after = JSON.stringify(window.state && state.posts ? state.posts : {});
      // Se houve alteração ou se o modal ainda está aberto, apenas fecha o modal.
      if (typeof closeModal === 'function') {
        closeModal();
      } else if (window.state) {
        state.modal = false;
        if (typeof render === 'function') render();
      }
      return result;
    };
  }
})();
</script>
